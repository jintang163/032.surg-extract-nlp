server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: surg-extract-backend
  profiles:
    active: offline
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 200MB
      file-size-threshold: 2KB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/surg_extract_nlp?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&allowLoadLocalInfile=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 3000
  neo4j:
    uri: bolt://${NEO4J_HOST:localhost}:${NEO4J_PORT:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4j123}
    pool:
      max-size: 20
      log-leaked-sessions: true

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
        transport:
          protocol: smtps
    default-encoding: UTF-8

  elasticsearch:
    uris: http://${ES_HOST:localhost}:9200
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
    connection-timeout: 10s
    socket-timeout: 60s

elasticsearch:
  index:
    surgery-record: surgery_records
  similarity:
    min-score: 0.5
    time-range-months: 6

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.surg.extract.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

nlp:
  service:
    url: ${NLP_SERVICE_URL:http://localhost:8000}
    timeout: 600

his:
  service:
    url: ${HIS_SERVICE_URL:}
    enabled: ${HIS_ENABLED:false}
    app-key: ${HIS_APP_KEY:}
    app-secret: ${HIS_APP_SECRET:}

storage:
  file:
    path: ./data/uploads
    allowed-types: txt,doc,docx,pdf,png,jpg,jpeg,gif,bmp,tiff
    ocr-types: pdf,png,jpg,jpeg,gif,bmp,tiff,doc,docx

logging:
  level:
    com.surg.extract: INFO
    org.springframework.web: INFO
    org.mybatis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: ./logs/surg-extract-backend.log
    max-size: 100MB
    max-history: 90

knife4j:
  enable: false
  setting:
    language: zh_cn
    enable-home-custom: false
  basic:
    enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

privacy:
  enabled: true
  data-masking:
    enabled: true
    fields:
      patient-name: true
      patient-id: true
      id-card: true
      phone: true
      address: true
  audit-log:
    enabled: true
    retention-days: 365

federated:
  enabled: true
  client:
    site-id: ${FEDERATED_SITE_ID:hospital-001}
    site-name: ${FEDERATED_SITE_NAME:默认院区}
    server-url: ${FEDERATED_SERVER_URL:}
    poll-interval-seconds: 3600
    max-local-epochs: 5
    batch-size: 16
    differential-privacy:
      enabled: true
      noise-multiplier: 1.0
      max-gradient-norm: 1.0
