# ============================================================
# 手术记录结构化提取系统 - Spring Boot Docker环境配置
# ============================================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: docker
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/surg_extract_nlp?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  elasticsearch:
    uris: http://${ES_HOST:localhost}:9200
  neo4j:
    uri: bolt://${NEO4J_HOST:localhost}:${NEO4J_PORT:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4j123}

nlp:
  service:
    url: ${NLP_SERVICE_URL:http://localhost:8000}
    timeout: 600

storage:
  file:
    path: /app/data/uploads
