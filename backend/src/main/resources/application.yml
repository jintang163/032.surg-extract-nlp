server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: surg-extract-backend
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
      file-size-threshold: 2KB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/surg_extract_nlp?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4j123
    pool:
      max-size: 20
      log-leaked-sessions: true

  mail:
    host: smtp.example.com
    port: 465
    username: noreply@example.com
    password: your-mail-password
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
        transport:
          protocol: smtps
    default-encoding: UTF-8

  elasticsearch:
    uris: http://localhost:9200
    username:
    password:
    connection-timeout: 5s
    socket-timeout: 30s

elasticsearch:
  index:
    surgery-record: surgery_records
  similarity:
    min-score: 0.5
    time-range-months: 6

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.surg.extract.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

nlp:
  service:
    url: http://localhost:8000
    timeout: 300

his:
  service:
    url: http://his.example.com/api
    enabled: false
    app-key: your-his-app-key
    app-secret: your-his-app-secret

storage:
  file:
    path: ./data/uploads
    allowed-types: txt,doc,docx,pdf,png,jpg,jpeg,gif,bmp,tiff
    ocr-types: pdf,png,jpg,jpeg,gif,bmp,tiff,doc,docx

logging:
  level:
    com.surg.extract: DEBUG
    org.springframework.web: INFO
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: ./logs/surg-extract-backend.log
    max-size: 50MB
    max-history: 30

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-home-custom: true
    home-custom-path: classpath:markdown/home.md
  basic:
    enable: false

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.surg.extract.controller

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
