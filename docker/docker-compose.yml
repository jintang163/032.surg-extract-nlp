version: '3.8'

services:
  mysql:
    image: mysql:8.0.35
    container_name: surg-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: surg_extract_nlp
      MYSQL_USER: surg
      MYSQL_PASSWORD: surg123
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
    volumes:
      - ./data/mysql/data:/var/lib/mysql
      - ./data/mysql/logs:/var/log/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - surg-network
    restart: unless-stopped

  redis:
    image: redis:7.2.4-alpine
    container_name: surg-redis
    environment:
      TZ: Asia/Shanghai
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ""
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - ./data/redis/data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - surg-network
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: surg-es
    environment:
      - TZ=Asia/Shanghai
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    volumes:
      - ./data/elasticsearch/data:/usr/share/elasticsearch/data
      - ./data/elasticsearch/logs:/usr/share/elasticsearch/logs
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - surg-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15-community
    container_name: surg-neo4j
    environment:
      - TZ=Asia/Shanghai
      - NEO4J_AUTH=neo4j/neo4j123
      - NEO4J_server_bolt_listen_address=0.0.0.0
      - NEO4J_server_bolt_advertised_address=:7687
      - NEO4J_server_http_listen_address=0.0.0.0
      - NEO4J_server_http_advertised_address=:7474
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1g
      - NEO4J_dbms_memory_pagecache_size=256m
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
      - ./data/neo4j/plugins:/plugins
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - surg-network
    restart: unless-stopped

  nlp-service:
    build:
      context: ./nlp-service
      dockerfile: Dockerfile
    container_name: surg-nlp-service
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
      - ES_HOST=elasticsearch
      - USE_GPU=false
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/temp:/app/data/temp
      - ./data/output:/app/data/output
      - ./nlp-service/config:/app/config:ro
      - ./nlp-service/models:/app/models:ro
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - surg-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surg-backend
    environment:
      - TZ=Asia/Shanghai
      - SPRING_PROFILES_ACTIVE=docker
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ES_HOST=elasticsearch
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=neo4j123
      - NLP_SERVICE_URL=http://nlp-service:8000
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      nlp-service:
        condition: service_started
    networks:
      - surg-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8080
        - VITE_NLP_BASE_URL=http://localhost:8000
    container_name: surg-frontend
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - surg-network
    restart: unless-stopped

networks:
  surg-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mysql-data:
  redis-data:
  es-data:
  neo4j-data:
